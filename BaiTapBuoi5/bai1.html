<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>BaiTapBuoi5</title>
    </head>
    <style>
        .container {
            display: flex;
            margin-left: 20px;
            justify-content: space-evenly;
            flex-wrap: wrap;
        }

        .container > div {
            margin: 40px;
        }

        .square {
            width: 100px;
            height: 100px;
            border: 5px solid #d56b57;
        }

        .rectangle {
            width: 150px;
            height: 80px;
            border: 5px solid #649cd9;
        }

        .triangle-up {
            border: 60px solid transparent;
            border-bottom: 120px solid #6dc978;
        }

        .triangle-down {
            border: 60px solid transparent;
            border-top: 120px solid #e3a031;
        }

        .triangle-left {
            border: 60px solid transparent;
            border-right: 120px solid #905cb2;
        }

        .triangle-right {
            border: 60px solid transparent;
            border-left: 120px solid #d48332;
        }

        .trapezium {
            width: 100px;
            border-bottom: 100px solid #61b99d;
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
        }

        .wide-triangle {
            border: 100px solid transparent;
            border-bottom: 80px solid #3a485d;
        }

        .pointed-triangle {
            border-left: 60px solid transparent;
            border-right: 60px solid transparent;
            border-bottom: 220px solid #ad4430;
        }

        .isosceles-triangle {
            border: 80px solid transparent;
            border-bottom: 80px solid #c05c19;
        }

        .right-arrow {
            border: 50px solid transparent;
            border-left: 100px solid #529e86;
        }

        .left-arrow {
            border: 50px solid transparent;
            border-right: 100px solid #8348a9;
        }

        .ribbon {
            width: 100px;
            border: 50px solid transparent;
            border-color: #d15841 transparent #d15841 #d15841;
        }

        .f-8 {
            display: flex;
        }

        .f-8 .letter-f {
            display: flex;
            margin-right: 40px;
        }

        .f-8 .letter-f .part-1 {
            width: 30px;
            height: 200px;
            background: #d15841;
        }

        .f-8 .letter-f .part-2 div {
            width: 100px;
            height: 30px;
            background: #d15841;
        }

        .f-8 .letter-f .part-2 div:last-child {
            margin-top: 50px;
        }

        .f-8 .number-8 div {
            border: 30px solid #d15841;
        }

        .f-8 .number-8 div:first-child {
            width: 70px;
            height: 50px;
            border-bottom: 15px solid #d15841;
        }

        .f-8 .number-8 div:last-child {
            width: 70px;
            height: 65px;
            border-top: 15px solid #d15841;
        }
    </style>
    <body>
        <header>
            <h1>Các hình có thể tạo được với Border</h1>
        </header>

        <div class="container">
            <div class="ex-1">
                <div class="square"></div>
                <p>1. Hình vuông</p>
            </div>

            <div class="ex-2">
                <div class="rectangle"></div>
                <p>2. Hình chữ nhật</p>
            </div>

            <div class="ex-3">
                <div class="triangle-up"></div>
                <p>3. Tam giác lên</p>
            </div>

            <div class="ex-4">
                <div class="triangle-down"></div>
                <p>4. Tam giác xuống</p>
            </div>

            <div class="ex-5">
                <div class="triangle-left"></div>
                <p>5. Tam giác trái</p>
            </div>

            <div class="ex-6">
                <div class="triangle-right"></div>
                <p>6. Tam giác phải</p>
            </div>

            <div class="ex-7">
                <div class="trapezium"></div>
                <p>7. Hình thang</p>
            </div>

            <div class="ex-8">
                <div class="wide-triangle"></div>
                <p>8. Tam giác rộng</p>
            </div>

            <div class="ex-9">
                <div class="pointed-triangle"></div>
                <p>9. Tam giác nhọn</p>
            </div>

            <div class="ex-10">
                <div class="isosceles-triangle"></div>
                <p>10. Tam giác cân</p>
            </div>

            <div class="ex-11">
                <div class="right-arrow"></div>
                <p>11. Mũi tên phải</p>
            </div>

            <div class="ex-12">
                <div class="left-arrow"></div>
                <p>12. Mũi tên trái</p>
            </div>

            <div class="ex-13">
                <div class="ribbon"></div>
                <p>13. Lá cờ</p>
            </div>

            <div class="ex-14">
                <div class="f-8">
                    <div class="letter-f">
                        <div class="part-1"></div>
                        <div class="part-2">
                            <div></div>
                            <div></div>
                        </div>
                    </div>
                    <div class="number-8">
                        <div></div>
                        <div></div>
                    </div>
                </div>
                <p>14. F8</p>
            </div>
        </div>
    </body>
</html>
